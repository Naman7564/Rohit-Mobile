version: '3.9'

services:
  web:
    build: .
    container_name: rohit_mobile_web
    command: sh -c "python manage.py migrate && gunicorn rohit_mobile_project.wsgi --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=rohit_mobile_project.settings
      - ALLOWED_HOSTS=localhost,127.0.0.1,web,nginx
      - AI_PROVIDER=openai
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your-api-key-here}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      - db
    networks:
      - rohit_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/products/"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: sqlite
    container_name: rohit_mobile_db
    volumes:
      - db_volume:/data
    networks:
      - rohit_network
    # SQLite doesn't require traditional database service, but we keep this for future migration to PostgreSQL

  nginx:
    image: nginx:latest
    container_name: rohit_mobile_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    networks:
      - rohit_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_volume:
  static_volume:
  media_volume:

networks:
  rohit_network:
    driver: bridge
